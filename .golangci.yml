linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-rules:
    # Exclude errcheck for defer statements in tests (cleanup)
    - path: _test\.go$
      linters:
        - errcheck

run:
  timeout: 5m
  tests: true