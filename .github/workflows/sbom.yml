name: SBOM Generation

on:
  push:
    tags:
      - 'v*'  # Run on version tags
  workflow_dispatch:  # Manual trigger

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: go.sum
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Install cyclonedx-gomod
      run: |
        go install github.com/CycloneDX/cyclonedx-gomod@latest
    
    - name: Generate SBOM for module
      run: |
        cyclonedx-gomod mod -json -output sbom.json
        echo "SBOM generated:"
        ls -la sbom.json
    
    - name: Generate SBOM for application
      run: |
        cyclonedx-gomod app -json -output sbom-app.json ./cmd/running-man
        echo "Application SBOM generated:"
        ls -la sbom-app.json
    
    - name: Upload SBOM as artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: |
          sbom.json
          sbom-app.json
        retention-days: 30
    
    - name: Create GitHub Release with SBOM
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          sbom.json
          sbom-app.json
        name: SBOM for ${{ github.ref_name }}
        body: |
          # Software Bill of Materials (SBOM)
          
          This release includes SBOM files for security and compliance.
          
          ## Files:
          - `sbom.json` - Module dependencies SBOM
          - `sbom-app.json` - Application SBOM
          
          ## Format:
          - CycloneDX JSON format
          - Includes all dependencies with versions
          - Can be used for vulnerability scanning and license compliance
          
          ## Generated by:
          GitHub Actions SBOM Generation Workflow