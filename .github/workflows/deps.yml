name: Dependency Updates

on:
  schedule:
    - cron: '0 10 * * 1'  # Weekly on Monday at 10 AM
  workflow_dispatch:  # Manual trigger

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: go.sum
    
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Check for outdated dependencies
      id: check
      run: |
        echo "Current dependencies:"
        go list -m all | head -20
        
        echo -e "\nChecking for updates..."
        go list -u -m all 2>/dev/null | grep -E "\[.*\]" || echo "All dependencies are up to date"
        
        # Check if there are updates
        UPDATES=$(go list -u -m all 2>/dev/null | grep -E "\[.*\]" | wc -l)
        echo "updates_count=$UPDATES" >> $GITHUB_OUTPUT
    
    - name: Create update branch
      if: steps.check.outputs.updates_count != '0'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b deps/update-$(date +%Y%m%d)
    
    - name: Update dependencies
      if: steps.check.outputs.updates_count != '0'
      run: |
        echo "Updating dependencies..."
        go get -u ./...
        go mod tidy
        
        # Check what changed
        git diff go.mod go.sum || echo "No changes to go.mod/go.sum"
    
    - name: Create Pull Request
      if: steps.check.outputs.updates_count != '0'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: deps/update-$(date +%Y%m%d)
        delete-branch: true
        title: "chore(deps): update Go dependencies"
        body: |
          ## Dependency Updates
          
          This PR updates Go dependencies to their latest versions.
          
          ### Changes:
          - Updated dependencies via `go get -u ./...`
          - Ran `go mod tidy` to clean up
          
          ### Next Steps:
          - Review the changes in `go.mod` and `go.sum`
          - Run tests to ensure compatibility
          - Merge if all checks pass
          
          ### Generated by:
          GitHub Actions Dependency Update Workflow
        labels: dependencies, automated-pr
        assignees: elbeanio
        reviewers: elbeanio
        commit-message: "chore(deps): update Go dependencies"
    
    - name: Notify if no updates
      if: steps.check.outputs.updates_count == '0'
      run: |
        echo "All dependencies are up to date!"
        echo "No PR created."

  security-updates:
    name: Security Updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Check for security vulnerabilities
      id: vulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        
        # Run govulncheck and capture output
        VULN_OUTPUT=$(govulncheck ./... 2>&1 || true)
        echo "$VULN_OUTPUT"
        
        # Check if there are vulnerabilities
        if echo "$VULN_OUTPUT" | grep -q "No vulnerabilities found"; then
          echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
        else
          echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          echo "vulnerability_report<<EOF" >> $GITHUB_OUTPUT
          echo "$VULN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
    
    - name: Create security update PR if needed
      if: steps.vulncheck.outputs.has_vulnerabilities == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: security/update-$(date +%Y%m%d)
        delete-branch: true
        title: "security: update vulnerable dependencies"
        body: |
          ## Security Vulnerability Updates
          
          This PR addresses security vulnerabilities found in dependencies.
          
          ### Vulnerabilities Found:
          ```
          ${{ steps.vulncheck.outputs.vulnerability_report }}
          ```
          
          ### Next Steps:
          1. Review the vulnerability report above
          2. Update affected dependencies
          3. Run tests to ensure compatibility
          4. Merge to address security issues
          
          ### Generated by:
          GitHub Actions Security Update Workflow
        labels: security, dependencies, automated-pr
        assignees: elbeanio
        reviewers: elbeanio
        commit-message: "security: update vulnerable dependencies"